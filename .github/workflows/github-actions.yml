name: build
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/

  test:
    name: "py${{ matrix.python }} (ubuntu)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: install dependencies
        run: uv sync --group test
      - name: test
        run: uv run pytest -m "not live and not slow" --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=84 -vv tests/
      - name: upload coverage
        if: ${{ matrix.python == '3.13' }}
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          name: py${{ matrix.python }}-ubuntu
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  layered-test:
    name: "layered integration/system tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: install dependencies
        run: uv sync --group test
      - name: integration and system tests
        run: uv run pytest -m "integration or system or contracts" -vv tests/

  live-test:
    name: "live provider tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      SCIREAD_RUN_LIVE: "1"
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: install dependencies
        run: uv sync --group test
      - name: live tests
        run: uv run pytest -m live -vv tests/
