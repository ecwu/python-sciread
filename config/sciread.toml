# Configuration file for sciread package
# Copy this file to ~/.config/sciread/config.toml and update with your API keys

[llm_providers.deepseek]
api_key = "${DEEPSEEK_API_KEY}"
default_model = "deepseek-chat"
base_url = "https://api.deepseek.com"

[llm_providers.volcengine]
# Volcengine currently also falls back to VOLCES_API from the environment.
api_key = "${VOLCES_API}"
default_model = "doubao-seed-2.0-code"
base_url = "https://ark.cn-beijing.volces.com/api/coding/v3"

[llm_providers.ollama]
base_url = "http://localhost:11434/v1"
default_model = "qwen3:4b"

[llm_providers.default]
# Default provider to use when none is specified
provider = "deepseek"
model = "deepseek-chat"

# Document splitter configuration exposed by the current config model.
# The document builder auto-selects MarkdownSplitter for markdown input and
# SemanticSplitter for non-markdown input unless a splitter is provided
# explicitly in code. The sections below configure those default splitters.
[document_splitters]
# Supported values: "regex_section", "markdown", "semantic"
default_splitter = "regex_section"

[document_splitters.regex_section]
min_chunk_size = 200
chunk_overlap = 0
confidence_threshold = 0.3
# Custom patterns (optional)
# custom_patterns = { "my_pattern" = "my regex pattern" }

[document_splitters.markdown]
min_chunk_size = 200
max_chunk_size = 2000
chunk_overlap = 0
preserve_code_blocks = true
split_on_headers = true
confidence_threshold = 0.7

[document_splitters.semantic]
min_chunk_size = 200
max_chunk_size = 2000
chunk_overlap = 0
preserve_code_blocks = true
split_on_headers = true
confidence_threshold = 0.7
enable_academic_patterns = true
enable_markdown_patterns = false

# Mineru API Configuration (for PDF to Markdown conversion)
[mineru]
# Set your Mineru API token here or use MINERU_TOKEN environment variable
token = "${MINERU_TOKEN}"
enable_formula = true     # Enable formula extraction
enable_table = true       # Enable table extraction
language = "ch"           # Document language: "ch" for Chinese, "en" for English
timeout = 600             # Processing timeout in seconds
poll_interval = 10        # Status poll interval in seconds
enable_cache = true       # Cache Mineru responses when possible
# cache_dir = "~/.sciread/mineru_cache"

# Vector store configuration for RAG functionality
[vector_store]
# Path to store vector indices for persistent search
path = "~/.sciread/vector_store"
# Default model for embeddings (should match your Ollama setup)
embedding_model = "embeddinggemma:latest"
# Embedding batch size
batch_size = 10
# Cache embeddings for better performance
cache_embeddings = true
